<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Profile Setup | TalentGoldPlus</title>

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
</head>

<body>

<header>
  <nav>

    <div class="logo">
      <span class="logo-text">
        Talent<span class="gold">Gold</span>Plus
      </span>
    </div>

    <div class="menu-toggle">☰</div>

    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="marketplace.html">Marketplace</a></li>
      <li><a href="profile-setup.html">Profile</a></li>
    </ul>

    <button id="logoutBtn" class="btn-primary nav-btn">
      Logout
    </button>

  </nav>
</header>

<main>

  <section class="dashboard-hero">

    <div class="container">

      <p class="hero-sub">
        PROFILE SETUP
      </p>

      <h1>
        Complete Your Profile
      </h1>

      <p>
        Build your TalentGoldPlus identity so athletes, coaches,
        scouts, professionals and supporters can discover you.
      </p>

    </div>

  </section>

  <section class="container auth-container">

    <div class="auth-card profile-setup-card">

      <form id="profileForm" class="profile-form">

        <div class="form-group">
          <label for="profileImage">
            Profile Picture
          </label>

          <input
            type="file"
            id="profileImage"
            accept="image/*"
          >
        </div>

        <div class="form-group">
          <input
            type="text"
            id="fullName"
            placeholder="Full Name"
            required
          >
        </div>

        <div class="form-group">
          <input
            type="text"
            id="location"
            placeholder="Location"
          >
        </div>

        <div class="form-group">
          <textarea
            id="bio"
            placeholder="Tell us about yourself"
          ></textarea>
        </div>

        <div id="dynamicProfileFields"></div>

        <button type="submit" class="btn-primary auth-btn">
          Save Profile
        </button>

      </form>

    </div>

  </section>

</main>

<script src="../js/navigation.js"></script>
<script type="module" src="../js/auth.js"></script>
<script type="module" src="../js/profile.js"></script>

</body>
</html>
