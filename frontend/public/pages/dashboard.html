<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard | TalentGoldPlus</title>

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
</head>

<body>

  <!-- HEADER -->
  <header>

    <nav>

      <div class="logo">

        <img src="../assets/images/Talentgoldplus.png" alt="TalentGoldPlus Logo">

        <span class="logo-text">
          Talent<span class="gold">Gold</span>Plus
        </span>

      </div>

      <div class="menu-toggle">☰</div>

      <ul class="nav-links" id="dashboardNav">

      </ul>

      <button id="logoutBtn" class="btn-primary nav-btn">
        Logout
      </button>

    </nav>

  </header>

  <!-- MAIN -->
  <main>

    <section class="container">
  
      <h1 id="welcomeMessage">
        Welcome
      </h1>
  
      <p id="roleText">
        Loading dashboard...
      </p>
  
      <div class="athlete-grid" id="dashboardCards">
  
      </div>
  
    </section>
  
  </main>

  <!-- JS -->
  <script src="../js/navigation.js"></script>

  <script type="module" src="../js/auth.js"></script>

</body>
</html>
