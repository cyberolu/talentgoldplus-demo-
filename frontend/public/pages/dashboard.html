<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard | TalentGoldPlus</title>

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
</head>

<body>

<header>
  <nav>

    <div class="logo">
      <span class="logo-text">
        Talent<span class="gold">Gold</span>Plus
      </span>
    </div>

    <div class="menu-toggle">☰</div>

    <ul class="nav-links" id="dashboardNav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="marketplace.html">Marketplace</a></li>
      <li><a href="profile-setup.html">Profile</a></li>
    </ul>

    <button id="logoutBtn" class="btn-primary nav-btn">
      Logout
    </button>

  </nav>
</header>

<main>

  <section class="dashboard-hero">
    <div class="container dashboard-hero-inner">

      <div>
        <p class="hero-sub">YOUR TALENTGOLDPLUS HUB</p>

        <h1 id="welcomeMessage">
          Welcome
        </h1>

        <p id="roleText">
          Loading dashboard...
        </p>
        <div id="profilePreview" class="dashboard-profile-preview"></div>
      </div>

      <a href="profile-setup.html" class="btn-primary">
        Complete Profile
      </a>

    </div>
  </section>

  <section class="container dashboard-section">

    <div class="dashboard-stats">

      <a href="profile-setup.html" class="dashboard-card-link">
    
        <div class="dashboard-stat">
          <h3>Profile</h3>
          <p>Build your public identity.</p>
        </div>
    
      </a>
    
      <a href="community.html" class="dashboard-card-link">
    
        <div class="dashboard-stat">
          <h3>Community</h3>
          <p>Connect with the ecosystem.</p>
        </div>
    
      </a>
    
      <a href="marketplace.html" class="dashboard-card-link">
    
        <div class="dashboard-stat">
          <h3>Marketplace</h3>
          <p>Find services and opportunities.</p>
        </div>
    
      </a>
    
    </div>

    <h2>Your Quick Actions</h2>

    <div class="athlete-grid" id="dashboardCards"></div>

  </section>

</main>

<script src="../js/navigation.js"></script>
<script type="module" src="../js/auth.js"></script>

</body>
</html>
