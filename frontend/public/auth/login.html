<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | TalentGoldPlus</title>

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <nav>

      <div class="logo">

        <img src="../assets/images/Talentgoldplus.png" alt="TalentGoldPlus Logo">

        <span class="logo-text">
          Talent<span class="gold">Gold</span>Plus
        </span>

      </div>

      <div class="menu-toggle">☰</div>

      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
      </ul>

    </nav>
  </header>

  <!-- MAIN -->
  <main>

    <section class="container auth-container">

      <div class="auth-card">

        <h1>Welcome Back</h1>

        <p>
          Login to continue your TalentGoldPlus journey.
        </p>

        <!-- LOGIN FORM -->
        <form id="loginForm">

          <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
          >

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          >

          <button type="submit" class="btn-primary auth-btn">
            Login
          </button>

        </form>

        <!-- DIVIDER -->
        <div class="auth-divider">
          <span>OR</span>
        </div>

        <!-- GOOGLE LOGIN -->
        <button id="googleLoginBtn" class="btn-secondary auth-btn">

          Continue with Google

        </button>

        <!-- REGISTER -->
        <p class="auth-switch">

          Don’t have an account?

          <a href="register.html">
            Create Account
          </a>

        </p>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="../js/navigation.js"></script>

  <script type="module" src="../js/auth.js"></script>

</body>
</html>
